name: 🧪 Run Quality Gates

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  SIGNATURE_ENCRYPTION_KEY: ${{ secrets.SIGNATURE_ENCRYPTION_KEY }}
  BOT_OWNER_TELEGRAM_ID: ${{ secrets.BOT_OWNER_TELEGRAM_ID }}
  BOT_OWNER_TELEGRAM_USERNAME: ${{ secrets.BOT_OWNER_TELEGRAM_USERNAME }}
  TEST_DATABASE_URL: postgresql+psycopg://finpipe:finpipe@postgres:5432/finpipe_test
  EMAIL_DRY_RUN: true

jobs:
  code-style:
    name: 🎨 Code Style
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/katrinio/finpipe-ci:latest

    steps:
      - uses: actions/checkout@v5

      - name: Run Ruff
        run: poetry run ruff check .

      - name: Run MyPy
        run: poetry run mypy src

  tests-and-coverage:
    name: 🧪 Tests + Coverage
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/katrinio/finpipe-ci:latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: finpipe
          POSTGRES_PASSWORD: finpipe
          POSTGRES_DB: finpipe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finpipe -d finpipe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v5

      - name: Check Alembic heads
        run: poetry run alembic heads

      - name: Debug Alembic environment
        run: |
          echo "TEST_DATABASE_URL is set: ${TEST_DATABASE_URL:+yes}"
          grep -n "TEST_DATABASE_URL\|DATABASE_URL\|get_database_url" migrations/env.py || true

      - name: Apply migrations
        run: poetry run alembic upgrade head

      - name: Run Tests + Coverage
        run: |
          poetry run pytest tests \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            -q \
            -ra \
            --durations=10 \
            -o log_cli=false
