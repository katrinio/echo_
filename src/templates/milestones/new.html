{% extends "base.html" %}
{% block title %}New milestone{% endblock %}
{% block content %}
    {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    <a class="back" href="/">← Back</a>
    <h1>New milestone</h1>
    <form method="post" action="/new">
        <label>
            Title
            <input name="title" required>
        </label>
        <label>
            Date
            <input id="happened_at"
                   type="date"
                   name="happened_at"
                   value="{{ today }}"
                   max="{{ today }}"
                   required>
        </label>
        <label>
            Description
            <textarea name="description"></textarea>
        </label>
        <label>
            Tags
            <input name="tags" list="tag-options" placeholder="PROJECTS JOY">
        </label>

        <datalist id="tag-options">
            {% for tag in all_tags %}
                <option value="{{ tag.name }}">
            {% endfor %}
        </datalist>
        <button type="submit">Save</button>
    </form>
{% endblock %}
